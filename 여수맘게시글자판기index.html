<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여수맘카페 게시글 자판기</title>
    <style>
        :root { --primary-color: #ff8e7e; --bg-color: #fff5f4; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary-color); font-size: 1.6rem; margin-bottom: 25px; }
        
        /* 입력 폼 */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--primary-color); }
        
        .btn-main { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 결과 카드 */
        .result-card { background: #fff; border: 1px solid #ffe0dd; padding: 20px; border-radius: 12px; margin-top: 20px; position: relative; }
        .copy-btn { position: absolute; top: 15px; right: 15px; background: #f8f9fa; border: 1px solid #ddd; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .photo-tip { background: #f0f7ff; padding: 10px; border-radius: 8px; font-size: 0.9rem; color: #007bff; margin: 10px 0; border-left: 4px solid #007bff; }
        .content-body { white-space: pre-wrap; color: #333; margin-top: 15px; }
        .tags { color: #ff8e7e; font-weight: bold; margin-top: 10px; }

        /* 히스토리 */
        .history-section { margin-top: 40px; border-top: 2px dashed #eee; padding-top: 20px; }
        .history-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .history-item:hover { background: #fffaf9; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌸 여수맘카페 게시글 자판기</h1>
    
    <div class="input-group">
        <label>핵심 키워드 (쉼표로 구분)</label>
        <input type="text" id="keywords" placeholder="예: 수제반찬, 아이간식, 친환경, 로컬푸드">
    </div>
    
    <div class="input-group">
        <label>문체 선택</label>
        <select id="tone">
            <option value="friendly">친근함 (여수맘 소통 모드)</option>
            <option value="professional">전문적 (꼼꼼한 비교 분석 모드)</option>
            <option value="emotional">감성적 (감동과 가치 전달 모드)</option>
        </select>
    </div>

    <button class="btn-main" onclick="generatePosts()">게시글 3개 생성하기</button>

    <div id="outputArea"></div>

    <div class="history-section">
        <h3>🕒 최근 작성 목록</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // 페이지 로드 시 기존 히스토리 표시
    window.onload = () => updateHistoryDisplay();

    function generatePosts() {
        const keywordInput = document.getElementById('keywords').value;
        const tone = document.getElementById('tone').value;
        
        if (!keywordInput) { alert('키워드를 입력해주세요!'); return; }
        
        const kw = keywordInput.split(',').map(s => s.trim());
        const mainKw = kw[0];
        const subKw = kw.slice(1).join(', ');

        const results = [];
        for (let i = 1; i <= 3; i++) {
            results.push(createContent(i, mainKw, subKw, tone, kw));
        }

        displayResults(results);
        saveToHistory(mainKw, results);
    }

    function createContent(index, main, sub, tone, allKw) {
        let content = "";
        let photoTip = "";

        if (tone === 'friendly') {
            photoTip = "📸 추천 사진: 제품의 실물 근접샷, 아이가 사용하는 모습, 택배 박스 개봉 사진";
            content = `여수맘님들~ 오늘 날씨 너무 좋죠? 😊\n\n다름이 아니라 제가 이번에 '${main}'을(를) 알게 됐는데, 너무 괜찮아서 공유해봐요! 사실 요즘 육아하느라 바빠서 이런 거 챙기기 힘들잖아요. 근데 이건 ${sub} 기능까지 있어서 정말 편하더라고요.\n\n제가 직접 써보니까 왜 다들 '${main}' 추천하는지 알 것 같아요. 특히 ${allKw[1] || '품질'} 부분이 제일 맘에 들었어요. 우리 여수 엄마들이라면 다들 좋아하실 스타일이에요!\n\n혹시 궁금한 거 있으심 댓글 주세요~ 제가 아는 선에서 다 알려드릴게요! 오늘도 다들 육아 화이팅이에요! 💕`;
        } else if (tone === 'professional') {
            photoTip = "📸 추천 사진: 성분표 줌인 사진, 타사 제품과의 비교 도표, 인증서 캡처";
            content = `안녕하세요. 오늘은 정보 공유 차원에서 '${main}'에 대한 꼼꼼 리뷰를 남겨봅니다.\n\n주부 입장에서 제품 하나 고를 때도 성분이나 ${sub} 같은 부분을 안 따질 수가 없더라고요. '${main}'의 경우 ${allKw[0]} 측면에서 매우 우수한 수치를 보여주었습니다.\n\n특히 ${allKw[1] || '디테일'} 처리가 잘 되어 있어 가성비와 가심비를 모두 잡은 느낌이에요. 합리적인 소비를 지향하는 맘님들이라면 리스트에 넣어두셔도 좋을 것 같습니다. 분석 결과 공유하니 참고하세요.`;
        } else {
            photoTip = "📸 추천 사진: 따뜻한 조명 아래 감성 컷, 손편지나 예쁜 패키지 사진, 일상의 여유로운 모습";
            content = `소중한 우리 아이에게, 그리고 나에게 주는 선물 같은 '${main}' 이야기를 해볼까 해요. ✨\n\n매일 반복되는 일상 속에서 '${main}' 하나로 집안 분위기가, 제 마음이 조금은 더 따뜻해진 기분이에요. ${sub} 속에 담긴 진심이 느껴진달까요?\n\n단순한 물건이 아니라, 가치를 소비한다는 느낌을 받았어요. ${allKw[1] || '정성'}이 듬뿍 담긴 이 느낌... 저만 알기 아까워 여수 맘님들과 나누고 싶네요. 오늘도 각자의 자리에서 빛나는 여러분을 응원합니다.`;
        }

        const tags = allKw.concat(['여수맘', '육아소통', '정보공유', '맘카페추천', '여수일상']).slice(0, 10).map(t => '#' + t.replace(/\s/g, ''));
        return { content, photoTip, tags: tags.join(' ') };
    }

    function displayResults(results) {
        const area = document.getElementById('outputArea');
        area.innerHTML = "";
        results.forEach((res, i) => {
            area.innerHTML += `
                <div class="result-card">
                    <strong>게시글 시안 ${i+1}</strong>
                    <button class="copy-btn" onclick="copyText(this, ${i})">전체 복사</button>
                    <div class="photo-tip">${res.photoTip}</div>
                    <div class="content-body" id="text-${i}">${res.content}</div>
                    <div class="tags" id="tags-${i}">${res.tags}</div>
                </div>`;
        });
    }

    function copyText(btn, id) {
        const text = document.getElementById(`text-${id}`).innerText + "\n\n" + document.getElementById(`tags-${id}`).innerText;
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = "복사 완료!";
            setTimeout(() => btn.innerText = "전체 복사", 2000);
        });
    }

    function saveToHistory(title, results) {
        let history = JSON.parse(localStorage.getItem('momCafeHistory') || '[]');
        history.unshift({ title, results, date: new Date().toLocaleString() });
        history = history.slice(0, 10);
        localStorage.setItem('momCafeHistory', JSON.stringify(history));
        updateHistoryDisplay();
    }

    function updateHistoryDisplay() {
        const list = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('momCafeHistory') || '[]');
        list.innerHTML = history.length ? '' : '<p>저장된 기록이 없어요.</p>';
        history.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>[${item.title}] ${item.date}</span>`;
            div.onclick = () => displayResults(item.results);
            list.appendChild(div);
        });
    }
</script>

</body>
</html>
