<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국내여행안내사 면접 프롬프트 생성기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", Arial, sans-serif;
      background: linear-gradient(135deg, #f7f9fc, #eef4ff);
      color: #222;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.3;
    }

    .sub {
      margin: 0;
      color: #555;
      font-size: 15px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid #d7deea;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
      background: #fff;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.65;
    }

    .full {
      grid-column: 1 / -1;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .primary:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .secondary:hover {
      background: #dbe7ff;
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .danger:hover {
      background: #fecaca;
    }

    .output-box {
      border: 1px solid #d7deea;
      border-radius: 16px;
      background: #f8fbff;
      padding: 18px;
      min-height: 360px;
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 15px;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
      line-height: 1.6;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 14px 0 0;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: #eef4ff;
      color: #1e40af;
      font-size: 13px;
      font-weight: 700;
    }

    .footer-note {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }

      .card {
        padding: 18px;
      }

      button {
        width: 100%;
      }

      .btn-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>국내여행안내사 면접 프롬프트 생성기</h1>
      <p class="sub">
        바이브코딩용 프롬프트를 한 번에 만들 수 있는 단일 HTML 페이지임.<br>
        옵션을 선택한 뒤 버튼을 누르면 아래에 완성 프롬프트가 생성됨.
      </p>

      <div class="badge-row">
        <span class="badge">한 파일 구성</span>
        <span class="badge">HTML + CSS + JavaScript</span>
        <span class="badge">복사 기능 포함</span>
        <span class="badge">모바일 대응</span>
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="roleName">면접 역할명</label>
          <input type="text" id="roleName" value="국내여행안내사 자격증 면접관">
        </div>

        <div class="field">
          <label for="yearRange">기출 반영 기간</label>
          <input type="text" id="yearRange" value="2020년부터 2025년 사이">
        </div>

        <div class="field">
          <label for="tone">면접 톤</label>
          <select id="tone">
            <option value="엄격하고 전문적인 톤">엄격하고 전문적인 톤</option>
            <option value="다소 압박감 있는 실전 톤">다소 압박감 있는 실전 톤</option>
            <option value="초보자도 연습 가능한 전문 톤">초보자도 연습 가능한 전문 톤</option>
          </select>
        </div>

        <div class="field">
          <label for="startType">첫 질문 시작 방식</label>
          <select id="startType">
            <option value="현장 대응력">현장 대응력</option>
            <option value="관광 트렌드 이해">관광 트렌드 이해</option>
          </select>
        </div>

        <div class="field full">
          <label for="customArea">추가 반영 키워드</label>
          <textarea id="customArea" placeholder="예: 친절한 고객 응대, 지역 문화 해설, 외국인 응대 제외, ESG 강조 등"></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button class="primary" onclick="generatePrompt()">프롬프트 생성</button>
        <button class="secondary" onclick="copyPrompt()">복사하기</button>
        <button class="danger" onclick="resetForm()">초기화</button>
      </div>

      <p class="small">
        생성된 문구는 아래 출력창에 표시되며, 복사 버튼으로 바로 사용할 수 있음.
      </p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">생성 결과</h2>
      <div id="output" class="output-box">아직 생성된 프롬프트가 없음.</div>
      <p id="status" class="footer-note">대기 중임.</p>
    </div>
  </div>

  <script>
    // 기본 프롬프트를 생성하는 함수
    function generatePrompt() {
      const roleName = document.getElementById("roleName").value.trim() || "국내여행안내사 자격증 면접관";
      const yearRange = document.getElementById("yearRange").value.trim() || "2020년부터 2025년 사이";
      const tone = document.getElementById("tone").value;
      const startType = document.getElementById("startType").value;
      const customArea = document.getElementById("customArea").value.trim();

      const customText = customArea
        ? `\n[추가 반영 사항]\n- 아래 사항도 면접 운영과 피드백에 반영할 것\n- ${customArea.split("\n").join("\n- ")}\n`
        : "";

      const prompt = `너는 이제부터 ‘${roleName}’임.

나는 면접 응시생임.

너는 ${yearRange} ${roleName} 면접시험의 최신 기출 경향과 출제 흐름을 반영하여 면접을 진행해야 함.

[목표]
실전 면접처럼 질문하고, 내 답변을 평가하며, 더 나은 답변 방향까지 제시해 주는 모의면접관 역할을 수행해야 함.

[진행 규칙]
1. 반드시 한 번에 한 질문씩만 제시할 것
2. 질문 영역은 아래 항목을 골고루 섞어서 낼 것
   - 인성 / 자질
   - 상황 대처
   - 관광 지식
   - 국내 관광자원 이해
   - 고객 응대 및 서비스 마인드
   - 최신 관광 트렌드
   - ESG 관광
   - 로컬관광 / 지역상생 / 지속가능관광
3. 질문은 실제 면접처럼 짧고 명확하게 할 것
4. 내가 답변하면 아래 순서대로 응답할 것
   (1) 종합 평가
   (2) 잘한 점
   (3) 보완할 점
   (4) 면접관이 추천하는 모범답변 버전 1
   (5) 면접관이 추천하는 모범답변 버전 2
   (6) 이어서 다음 질문 1개 제시
5. 피드백은 칭찬만 하지 말고, 실제 면접관처럼 다소 엄격하고 전문적으로 평가할 것
6. 답변 평가 시 다음 기준을 반영할 것
   - 질문 이해도
   - 논리성
   - 직무 적합성
   - 관광 현장 대응력
   - 고객 친화적 태도
   - 최신 관광 흐름 반영 여부
7. 모범답변 2가지는 성격이 다르게 작성할 것
   - 버전 1: 안정적이고 모범적인 답변
   - 버전 2: 차별화되고 인상적인 답변
8. 너무 길게 늘어지지 말고, 실제 면접 연습에 적합한 분량으로 작성할 것
9. 내가 “면접 종료”라고 하면 전체 총평을 해줄 것
10. 전체 총평에는 아래 내용을 포함할 것
   - 강점
   - 약점
   - 자주 나오는 실수
   - 최종 합격 가능성 평가
   - 마지막 보완 팁 5가지

[면접 톤]
- ${tone}을 유지할 것
- 과장된 칭찬보다 현실적인 평가를 우선할 것
- 답변이 모호하면 구체성이 부족하다고 분명히 지적할 것
- 답변이 좋으면 왜 좋은지 직무 관점에서 설명할 것

[시작 방식]
- 준비가 되면 별도 설명 없이 바로 1번 질문부터 시작할 것
- 첫 질문은 자기소개 또는 지원동기 계열이 아닌 ‘${startType}’을 볼 수 있는 질문으로 시작할 것
${customText}
[중요]
- 매번 반드시 질문은 하나씩만 제시할 것
- 내가 답변하기 전에는 모범답변이나 힌트를 먼저 주지 말 것
- 답변 후에는 평가와 모범답변 두 가지를 모두 제시한 뒤 다음 질문으로 넘어갈 것`;

      document.getElementById("output").textContent = prompt;
      document.getElementById("status").textContent = "프롬프트 생성 완료됨.";
    }

    // 생성된 프롬프트를 복사하는 함수
    function copyPrompt() {
      const text = document.getElementById("output").textContent;

      if (!text || text === "아직 생성된 프롬프트가 없음.") {
        document.getElementById("status").textContent = "먼저 프롬프트를 생성해야 함.";
        return;
      }

      navigator.clipboard.writeText(text)
        .then(() => {
          document.getElementById("status").textContent = "프롬프트가 클립보드에 복사되었음.";
        })
        .catch(() => {
          document.getElementById("status").textContent = "복사에 실패했음. 직접 드래그해서 복사하면 됨.";
        });
    }

    // 입력값을 초기화하는 함수
    function resetForm() {
      document.getElementById("roleName").value = "국내여행안내사 자격증 면접관";
      document.getElementById("yearRange").value = "2020년부터 2025년 사이";
      document.getElementById("tone").value = "엄격하고 전문적인 톤";
      document.getElementById("startType").value = "현장 대응력";
      document.getElementById("customArea").value = "";
      document.getElementById("output").textContent = "아직 생성된 프롬프트가 없음.";
      document.getElementById("status").textContent = "초기화 완료됨.";
    }

    // 페이지 로드 시 기본 프롬프트 자동 생성
    window.onload = function () {
      generatePrompt();
    };
  </script>
</body>
</html>
